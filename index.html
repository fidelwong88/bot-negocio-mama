<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bot Negocio Mamá</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap');
  :root {
    --bg: #0f0f0f; --surface: #1a1a1a; --surface2: #242424;
    --border: #2e2e2e; --accent: #00e5a0; --accent2: #00b37d;
    --text: #f0f0f0; --muted: #888; --user-bubble: #1e3a2f; --bot-bubble: #1a1a1a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
  header { padding: 16px 24px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; background: var(--surface); }
  .logo { width: 36px; height: 36px; background: var(--accent); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
  .header-info h1 { font-size: 15px; font-weight: 600; }
  .header-info p { font-size: 12px; color: var(--muted); }
  .status-dot { width: 8px; height: 8px; background: var(--accent); border-radius: 50%; margin-left: auto; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  .config-bar { background: var(--surface2); border-bottom: 1px solid var(--border); padding: 10px 24px; display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
  .config-bar label { font-size: 11px; color: var(--muted); font-family: 'DM Mono', monospace; text-transform: uppercase; }
  .config-bar input { background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 6px 10px; border-radius: 6px; font-size: 12px; font-family: 'DM Mono', monospace; width: 240px; outline: none; transition: border-color 0.2s; }
  .config-bar input:focus { border-color: var(--accent); }
  .config-bar button { background: var(--accent); color: #000; border: none; padding: 6px 14px; border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer; }
  .config-bar button:hover { background: var(--accent2); }
  .connected-badge { font-size: 11px; color: var(--accent); font-family: 'DM Mono', monospace; display: none; }
  .messages { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 16px; scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
  .message { display: flex; gap: 10px; max-width: 80%; animation: fadeIn 0.3s ease; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
  .message.user { align-self: flex-end; flex-direction: row-reverse; }
  .avatar { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; }
  .message.bot .avatar { background: var(--accent); }
  .message.user .avatar { background: var(--surface2); border: 1px solid var(--border); }
  .bubble { padding: 12px 16px; border-radius: 12px; font-size: 14px; line-height: 1.6; }
  .message.bot .bubble { background: var(--bot-bubble); border: 1px solid var(--border); border-top-left-radius: 4px; }
  .message.user .bubble { background: var(--user-bubble); border: 1px solid #1e5c42; border-top-right-radius: 4px; color: #b8f0d8; }
  .bubble table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 13px; font-family: 'DM Mono', monospace; }
  .bubble th { background: var(--surface2); padding: 8px 12px; text-align: left; color: var(--accent); font-size: 11px; text-transform: uppercase; border-bottom: 1px solid var(--border); }
  .bubble td { padding: 8px 12px; border-bottom: 1px solid var(--border); }
  .bubble tr:last-child td { border-bottom: none; }
  .quick-btns { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
  .quick-btn { background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 6px 12px; border-radius: 20px; font-size: 12px; cursor: pointer; transition: all 0.2s; font-family: 'DM Sans', sans-serif; }
  .quick-btn:hover { border-color: var(--accent); color: var(--accent); }
  .typing { display: flex; gap: 4px; align-items: center; padding: 14px 16px; }
  .typing span { width: 6px; height: 6px; background: var(--muted); border-radius: 50%; animation: bounce 1.2s infinite; }
  .typing span:nth-child(2){animation-delay:0.2s} .typing span:nth-child(3){animation-delay:0.4s}
  @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-4px)} }
  .input-area { padding: 16px 24px; border-top: 1px solid var(--border); background: var(--surface); display: flex; gap: 10px; align-items: flex-end; }
  textarea { flex: 1; background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 12px 16px; border-radius: 10px; font-size: 14px; font-family: 'DM Sans', sans-serif; resize: none; outline: none; line-height: 1.5; max-height: 120px; transition: border-color 0.2s; }
  textarea:focus { border-color: var(--accent); }
  textarea::placeholder { color: var(--muted); }
  .send-btn { background: var(--accent); border: none; color: #000; width: 42px; height: 42px; border-radius: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.2s; flex-shrink: 0; }
  .send-btn:hover { background: var(--accent2); }
  .send-btn svg { width: 18px; height: 18px; }
</style>
</head>
<body>
<header>
  <div class="logo">🧾</div>
  <div class="header-info">
    <h1>Bot Negocio Mamá</h1>
    <p>Asistente de ventas, gastos y SAT</p>
  </div>
  <div class="status-dot"></div>
</header>
<div class="config-bar">
  <label>Sheet ID:</label>
  <input type="text" id="sheetId" placeholder="ID de tu Google Sheet..." value="1Fb_WVSHJfwNihg1-ETL3HuVtOkbH1MD8sDxrD6LFZ30" />
  <label>API Key:</label>
  <input type="password" id="apiKey" placeholder="sk-ant-..." />
  <button onclick="conectar()">Conectar</button>
  <span class="connected-badge" id="connectedBadge">✓ Conectado</span>
</div>
<div class="messages" id="messages">
  <div class="message bot">
    <div class="avatar">🤖</div>
    <div class="bubble">
      ¡Hola! Soy el asistente del negocio de tu mamá. 👋<br><br>
      Ingresa tu <strong>API Key de Claude</strong> y haz clic en <strong>Conectar</strong>.
      <div class="quick-btns">
        <span class="quick-btn" onclick="preguntar(this)">📊 Ver resumen del mes</span>
        <span class="quick-btn" onclick="preguntar(this)">💰 ¿Cuánto debo al SAT?</span>
        <span class="quick-btn" onclick="preguntar(this)">📈 Ventas por mes</span>
        <span class="quick-btn" onclick="preguntar(this)">📉 Gastos totales</span>
      </div>
    </div>
  </div>
</div>
<div class="input-area">
  <textarea id="input" placeholder="Pregúntame algo del negocio..." rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
  <button class="send-btn" onclick="sendMessage()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <line x1="22" y1="2" x2="11" y2="13"></line>
      <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
    </svg>
  </button>
</div>
<script>
  let connected = false;
  let sheetData = null;
  let history = [];

  window.addEventListener('load', () => {
    const k = localStorage.getItem('bot_api_key');
    const s = localStorage.getItem('bot_sheet_id');
    if (k) document.getElementById('apiKey').value = k;
    if (s) document.getElementById('sheetId').value = s;
  });

  function preguntar(el) {
    document.getElementById('input').value = el.textContent.trim().replace(/^[^\w]+/, '');
    sendMessage();
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  }

  async function conectar() {
    const apiKey = document.getElementById('apiKey').value.trim();
    const sheetId = document.getElementById('sheetId').value.trim();
    if (!apiKey) { addMessage('bot', '❌ Ingresa tu API Key.'); return; }
    addMessage('bot', '🔄 Conectando con Google Sheets...');
    try {
      sheetData = await fetchSheets(sheetId);
      connected = true;
      history = [];
      localStorage.setItem('bot_api_key', apiKey);
      localStorage.setItem('bot_sheet_id', sheetId);
      document.getElementById('connectedBadge').style.display = 'inline';
      addMessage('bot', '✅ ¡Conectado! ¿Qué quieres saber?');
    } catch(e) {
      addMessage('bot', '❌ Error conectando: ' + e.message);
    }
  }

  async function fetchSheets(sheetId) {
    const names = ['VENTAS','GASTOS','RESUMEN SAT'];
    const data = {};
    for (const name of names) {
      const url = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(name)}`;
      const res = await fetch(url);
      if (!res.ok) throw new Error('No se pudo leer ' + name);
      data[name] = parseCSV(await res.text());
    }
    return data;
  }

  function parseCSV(text) {
    return text.trim().split('\n').map(line => {
      const cols = []; let cur = ''; let q = false;
      for (let c of line) {
        if (c === '"') q = !q;
        else if (c === ',' && !q) { cols.push(cur.trim()); cur = ''; }
        else cur += c;
      }
      cols.push(cur.trim());
      return cols;
    });
  }

  function buildContext(data) {
    let ctx = '';
    if (data['VENTAS']?.length > 1) {
      ctx += '\nVENTAS:\n';
      data['VENTAS'].slice(1).filter(r => r[0]).forEach(r => ctx += `- ${r.join(' | ')}\n`);
    }
    if (data['GASTOS']?.length > 1) {
      ctx += '\nGASTOS:\n';
      data['GASTOS'].slice(1).filter(r => r[0]).forEach(r => ctx += `- ${r.join(' | ')}\n`);
    }
    if (data['RESUMEN SAT']?.length > 1) {
      ctx += '\nRESUMEN SAT:\n';
      data['RESUMEN SAT'].slice(1).filter(r => r.slice(1).some(v => v && v !== '0')).forEach(r => {
        ctx += `${r[0]}: Ingresos=${r[1]} Gastos=${r[2]} IVA Cobrado=${r[3]} IVA Pagado=${r[4]} IVA a Pagar=${r[5]} ISR=${r[6]}\n`;
      });
    }
    return ctx || 'Sin datos aún.';
  }

  async function sendMessage() {
    const input = document.getElementById('input');
    const text = input.value.trim();
    if (!text) return;
    const apiKey = document.getElementById('apiKey').value.trim();
    const sheetId = document.getElementById('sheetId').value.trim();
    if (!apiKey) { addMessage('bot', '❌ Ingresa tu API Key primero.'); return; }

    addMessage('user', text);
    input.value = '';
    input.style.height = 'auto';

    // Agregar al historial ANTES de llamar a la API
    history.push({ role: 'user', content: text });

    const typingId = addTyping();

    try {
      if (!sheetData) sheetData = await fetchSheets(sheetId);
      const ctx = buildContext(sheetData);

      const systemPrompt = `Eres un asistente contable para un negocio en México que vende toners, cartuchos e insumos de impresión. La dueña es persona física con actividad empresarial. Habla en español casual y amigable.

REGLAS IMPORTANTES:
- Cuando el usuario dé un monto, calcula el IVA al 16% automáticamente SIN preguntar. Asume que es SUBTOTAL a menos que diga "total con IVA".
- Si dice "total con IVA", el subtotal es total/1.16.
- NUNCA pierdas el contexto de la conversación anterior.
- Registra ventas y gastos directamente sin hacer preguntas innecesarias.

DATOS DEL NEGOCIO:
${ctx}

Usa formato HTML para tablas. Usa $ y formato mexicano para dinero.`;

      const res = await fetch('https://bot-negocio-mama.fidelwong753.workers.dev/api/chat', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
         
        },
        body: JSON.stringify({
          model: 'claude-haiku-4-5-20251001',
          max_tokens: 1000,
          system: systemPrompt,
          messages: history
        })
      });

      removeTyping(typingId);

      if (!res.ok) {
        const err = await res.json();
        throw new Error(err.error?.message || 'Error API');
      }

      const data = await res.json();
      const reply = data.content[0].text;
      history.push({ role: 'assistant', content: reply });
      addMessage('bot', reply);

    } catch(e) {
      removeTyping(typingId);
      history.pop(); // Quitar mensaje fallido del historial
      addMessage('bot', '❌ Error: ' + e.message);
    }
  }

  function addMessage(role, text) {
    const msgs = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'message ' + role;
    const av = document.createElement('div');
    av.className = 'avatar';
    av.textContent = role === 'bot' ? '🤖' : '👤';
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.innerHTML = text.includes('<table') ? text : text.replace(/\n/g,'<br>').replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>');
    div.appendChild(av);
    div.appendChild(bubble);
    msgs.appendChild(div);
    msgs.scrollTop = msgs.scrollHeight;
  }

  function addTyping() {
    const msgs = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'message bot';
    const id = 'typing-' + Date.now();
    div.id = id;
    div.innerHTML = '<div class="avatar">🤖</div><div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>';
    msgs.appendChild(div);
    msgs.scrollTop = msgs.scrollHeight;
    return id;
  }

  function removeTyping(id) {
    const el = document.getElementById(id);
    if (el) el.remove();
  }
</script>
</body>
</html>
