<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<title>Suheid Wong</title>
<style>
  :root {
    --bg: #EAF5FF; --surface: #ffffff; --surface2: #D6EEFA;
    --border: #B8DDF5; --accent: #5BB8F5; --accent2: #2A9AD6;
    --text: #1A3A52; --muted: #6B9AB8;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; position: relative; }
  body::before { content: ''; position: fixed; top: -200px; right: -200px; width: 600px; height: 600px; border-radius: 50%; background: radial-gradient(circle, rgba(91,184,245,0.15) 0%, transparent 70%); pointer-events: none; z-index: 0; }
  body::after { content: ''; position: fixed; bottom: -150px; left: -150px; width: 500px; height: 500px; border-radius: 50%; background: radial-gradient(circle, rgba(91,184,245,0.12) 0%, transparent 70%); pointer-events: none; z-index: 0; }
  .deco { position: fixed; pointer-events: none; z-index: 0; border-radius: 50%; border: 1px solid rgba(91,184,245,0.2); }
  .deco-1 { width: 300px; height: 300px; top: 10%; right: 5%; }
  .deco-2 { width: 200px; height: 200px; top: 15%; right: 10%; }
  .deco-3 { width: 150px; height: 150px; bottom: 20%; left: 3%; }
  header { padding: 16px 24px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; background: rgba(255,255,255,0.85); backdrop-filter: blur(12px); position: relative; z-index: 10; box-shadow: 0 2px 20px rgba(91,184,245,0.1); }
  .logo { width: 40px; height: 40px; background: linear-gradient(135deg, #5BB8F5, #2A9AD6); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; box-shadow: 0 4px 12px rgba(91,184,245,0.3); }
  .header-info h1 { font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 700; color: var(--text); letter-spacing: 0.02em; }
  .header-info p { font-size: 11px; color: var(--muted); font-weight: 300; letter-spacing: 0.05em; text-transform: uppercase; }
  .status-dot { width: 8px; height: 8px; background: #5BB8F5; border-radius: 50%; margin-left: auto; animation: pulse 2s infinite; box-shadow: 0 0 8px rgba(91,184,245,0.5); }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.6;transform:scale(1.2)} }
  .config-bar { background: rgba(255,255,255,0.7); backdrop-filter: blur(8px); border-bottom: 1px solid var(--border); padding: 8px 24px; display: flex; gap: 12px; align-items: center; flex-wrap: wrap; position: relative; z-index: 10; }
  .config-bar label { font-size: 10px; color: var(--muted); font-family: 'DM Mono', monospace; text-transform: uppercase; letter-spacing: 0.08em; }
  .config-bar input { background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 6px 10px; border-radius: 8px; font-size: 12px; font-family: 'DM Mono', monospace; width: 240px; outline: none; }
  .config-bar input:focus { border-color: var(--accent); }
  .config-bar button { background: linear-gradient(135deg, #5BB8F5, #2A9AD6); color: white; border: none; padding: 6px 16px; border-radius: 8px; font-size: 12px; font-weight: 500; cursor: pointer; }
  .connected-badge { font-size: 11px; color: var(--accent2); font-family: 'DM Mono', monospace; display: none; font-weight: 500; }
  .messages { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 16px; position: relative; z-index: 1; }
  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  .message { display: flex; gap: 10px; max-width: 90%; animation: fadeIn 0.3s ease; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
  .message.user { align-self: flex-end; flex-direction: row-reverse; max-width: 82%; }
  .avatar { width: 34px; height: 34px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 15px; flex-shrink: 0; }
  .message.bot .avatar { background: linear-gradient(135deg, #5BB8F5, #2A9AD6); box-shadow: 0 2px 8px rgba(91,184,245,0.3); }
  .message.user .avatar { background: var(--surface); border: 1px solid var(--border); }
  .bubble { padding: 12px 16px; border-radius: 16px; font-size: 14px; line-height: 1.6; }
  .message.bot .bubble { background: rgba(255,255,255,0.9); backdrop-filter: blur(8px); border: 1px solid var(--border); border-top-left-radius: 4px; color: var(--text); box-shadow: 0 2px 12px rgba(91,184,245,0.08); }
  .message.user .bubble { background: linear-gradient(135deg, #5BB8F5, #2A9AD6); border-top-right-radius: 4px; color: white; box-shadow: 0 4px 16px rgba(91,184,245,0.35); }
  .chat-table { width: 100%; border-collapse: collapse; margin-top: 12px; font-size: 13px; border-radius: 10px; overflow: hidden; }
  .chat-table thead tr { background: linear-gradient(135deg, #5BB8F5, #2A9AD6); color: white; }
  .chat-table th { padding: 10px 12px; text-align: left; font-weight: 500; font-size: 12px; }
  .chat-table tbody tr { border-bottom: 1px solid var(--border); }
  .chat-table tbody tr:last-child { border-bottom: none; }
  .chat-table tbody tr:hover { background: var(--surface2); }
  .chat-table td { padding: 9px 12px; color: var(--text); }
  .chat-table tfoot tr { background: var(--surface2); }
  .chat-table tfoot td { padding: 10px 12px; color: var(--accent2); font-weight: 600; border-top: 2px solid var(--border); }
  .quick-btns { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
  .quick-btn { background: var(--surface2); border: 1px solid var(--border); color: var(--accent2); padding: 6px 14px; border-radius: 20px; font-size: 12px; cursor: pointer; font-weight: 500; transition: all 0.2s; }
  .quick-btn:hover { background: var(--accent); color: white; border-color: var(--accent); }
  .typing { display: flex; gap: 4px; align-items: center; padding: 14px 16px; }
  .typing span { width: 6px; height: 6px; background: var(--accent); border-radius: 50%; animation: bounce 1.2s infinite; }
  .typing span:nth-child(2){animation-delay:0.2s} .typing span:nth-child(3){animation-delay:0.4s}
  @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-5px)} }
  .input-area { padding: 16px 24px; border-top: 1px solid var(--border); background: rgba(255,255,255,0.85); backdrop-filter: blur(12px); display: flex; gap: 10px; align-items: flex-end; position: relative; z-index: 10; box-shadow: 0 -2px 20px rgba(91,184,245,0.08); }
  textarea { flex: 1; background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 12px 16px; border-radius: 12px; font-size: 14px; font-family: 'DM Sans', sans-serif; resize: none; outline: none; line-height: 1.5; max-height: 120px; }
  textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(91,184,245,0.15); }
  textarea::placeholder { color: var(--muted); }
  .send-btn { background: linear-gradient(135deg, #5BB8F5, #2A9AD6); border: none; color: white; width: 44px; height: 44px; border-radius: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; box-shadow: 0 4px 12px rgba(91,184,245,0.4); }
  .send-btn svg { width: 18px; height: 18px; }
</style>
</head>
<body>
<div class="deco deco-1"></div>
<div class="deco deco-2"></div>
<div class="deco deco-3"></div>
<header>
  <div class="logo">🧾</div>
  <div class="header-info">
    <h1>Suheid Wong</h1>
    <p>Ventas · Gastos · SAT</p>
  </div>
  <div class="status-dot"></div>
</header>
<div class="config-bar">
  <label>Sheet ID:</label>
  <input type="text" id="sheetId" value="1Fb_WVSHJfwNihg1-ETL3HuVtOkbH1MD8sDxrD6LFZ30" />
  <button onclick="conectar()">Conectar</button>
  <span class="connected-badge" id="connectedBadge">✓ Conectado</span>
</div>
<div class="messages" id="messages">
  <div class="message bot">
    <div class="avatar">🤖</div>
    <div class="bubble">¡Hola! Conectando con Google Sheets...</div>
  </div>
</div>
<div class="input-area">
  <textarea id="input" placeholder="Pregúntame algo del negocio..." rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
  <button class="send-btn" onclick="sendMessage()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <line x1="22" y1="2" x2="11" y2="13"></line>
      <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
    </svg>
  </button>
</div>
<script>
  const WORKER_URL = 'https://bot-negocio-mama.fidelwong753.workers.dev';
  let sheetData = null;
  let history = [];
  let pendingDelete = null;
  let pendingEdit = null;

  if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(() => {});

  window.addEventListener('load', () => {
    const s = localStorage.getItem('bot_sheet_id');
    if (s) document.getElementById('sheetId').value = s;
    conectar();
  });

  function preguntar(el) {
    document.getElementById('input').value = el.textContent.trim().replace(/^[^\w]+/, '');
    sendMessage();
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  }

  async function conectar() {
    const sheetId = document.getElementById('sheetId').value.trim();
    try {
      sheetData = await fetchSheets(sheetId);
      history = [];
      localStorage.setItem('bot_sheet_id', sheetId);
      document.getElementById('connectedBadge').style.display = 'inline';
      addMessage('bot', '✅ ¡Conectado! ¿Qué necesitas?\n<div class="quick-btns"><span class="quick-btn" onclick="preguntar(this)">📊 Ver ventas</span><span class="quick-btn" onclick="preguntar(this)">📉 Ver gastos</span><span class="quick-btn" onclick="preguntar(this)">💰 ¿Cuánto debo al SAT?</span><span class="quick-btn" onclick="preguntar(this)">📈 Resumen del mes</span></div>');
    } catch(e) {
      addMessage('bot', '❌ Error conectando. Verifica tu conexión.');
    }
  }

  async function fetchSheets(sheetId) {
    const names = ['VENTAS','GASTOS','RESUMEN SAT'];
    const data = {};
    for (const name of names) {
      const url = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(name)}`;
      const res = await fetch(url);
      if (!res.ok) throw new Error('No se pudo leer ' + name);
      data[name] = parseCSV(await res.text());
    }
    return data;
  }

  function parseCSV(text) {
    return text.trim().split('\n').map(line => {
      const cols = []; let cur = ''; let q = false;
      for (let c of line) {
        if (c === '"') q = !q;
        else if (c === ',' && !q) { cols.push(cur.trim()); cur = ''; }
        else cur += c;
      }
      cols.push(cur.trim());
      return cols;
    });
  }

  async function appendToSheet(sheet, values) {
    const sheetId = document.getElementById('sheetId').value.trim();
    const res = await fetch(`${WORKER_URL}/api/sheets`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ sheetId, range: sheet, values }) });
    return await res.json();
  }

  async function editSheetRow(sheet, row, values) {
    const sheetId = document.getElementById('sheetId').value.trim();
    const res = await fetch(`${WORKER_URL}/api/sheets/edit`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ sheetId, range: sheet, row, values }) });
    return await res.json();
  }

  async function deleteFromSheet(sheet, row) {
    const sheetId = document.getElementById('sheetId').value.trim();
    const res = await fetch(`${WORKER_URL}/api/sheets/delete`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ sheetId, range: sheet, row }) });
    return await res.json();
  }

  async function reorganizeSheet(sheet) {
    const sheetId = document.getElementById('sheetId').value.trim();
    const res = await fetch(`${WORKER_URL}/api/sheets/reorganize`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ sheetId, range: sheet }) });
    return await res.json();
  }

  function n(str) {
    return (str || '').toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").trim();
  }

  // ============================================================
  // DETECCIÓN DE INTENCIONES
  // ============================================================

  function detectarIntencion(text) {
    const t = n(text);

    // CONFIRMACIÓN
    const confirmar = ['si','yes','dale','ok','claro','anda','confirmo','adelante',
      'procede','hazlo','venga','perfecto','correcto','afirmativo','sure','yep',
      'porfa','orale','andale','sip','simon','va','bueno','hecho','listo','anda'];
    if (confirmar.some(p => t === p || t.startsWith(p + ' ') || t.endsWith(' ' + p))) {
      return 'confirmar';
    }

    // ELIMINAR
    const eliminar = ['borra','quita','elimina','borrar','quitar','eliminar','tacha',
      'tachala','sacala','sacalo','saca','cancela','canclar','remueve','remover',
      'bora','elimna','quta','ya no va','desaparece','desaparecer','quitalo','borralo',
      'eliminalo','fuera','afuera','noquiero','no quiero'];
    if (eliminar.some(p => t.includes(p))) return 'eliminar';

    // VER / CONSULTAR
    const ver = ['ver','muestra','muestrame','ensena','enseñame','lista','listame',
      'dame','dime','cuanto','cuantos','cuantas','que vendi','que gaste','mis ventas',
      'mis gastos','ventas del','gastos del','resumen','total','cuanto debo','sat',
      'iva','isr','reporte','informe','tengo','hay','existe'];
    if (ver.some(p => t.includes(p))) return 'consultar';

    // AGREGAR / REGISTRAR
    const agregar = ['agrega','registra','anota','mete','pon','anade','agegra',
      'registar','anega','vendi','vente','vendio','gaste','pague','compre',
      'agrega','nueva venta','nuevo gasto','agregar','registrar','anotar',
      'meter','poner','añade','añadir'];
    if (agregar.some(p => t.includes(p))) return 'registrar';

    // EDITAR / CORREGIR
    const editar = ['cambia','modifica','corrige','actualiza','edita','cambialo',
      'modificalo','corrigelo','actualiza','en realidad','estaba mal','era',
      'cambiar','modificar','corregir','actualizar','editar','arregla','arreglar',
      'rectifica','rectificar'];
    if (editar.some(p => t.includes(p))) return 'editar';

    return 'bot'; // dejar que el bot responda
  }

  // ============================================================
  // NORMALIZAR NOMBRES DE CLIENTES/PROVEEDORES
  // ============================================================
  function normalizarNombre(str) {
    const t = n(str);
    if (t.includes('baner') || t.includes('baaner') || t.includes('bander')) return 'Grupo Baner';
    if (t.includes('jonhy') || t.includes('johny') || t.includes('jonny') || t.includes('johnny')) return 'Grupo Jonhy';
    if (t.includes('aeropuerto') || t.includes('aero')) return 'Aeropuerto';
    if (t.includes('felipe') || t.includes('felip')) return 'Felipe';
    return str;
  }

  // ============================================================
  // EXTRAER DATOS DE UN MENSAJE (fecha, monto, cliente)
  // ============================================================
  function extraerDatos(text) {
    const resultado = {};
    const t = text;

    // Extraer monto
    const montoMatch = t.match(/\$?\s*(\d+(?:[.,]\d+)?)/);
    if (montoMatch) resultado.total = parseFloat(montoMatch[1].replace(',', '.'));

    // Extraer fecha (DD/MM/YYYY o "del 25" o "el 3")
    const fechaCompleta = t.match(/(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})/);
    if (fechaCompleta) {
      const d = fechaCompleta[1].padStart(2,'0');
      const m = fechaCompleta[2].padStart(2,'0');
      const y = fechaCompleta[3].length === 2 ? '20' + fechaCompleta[3] : fechaCompleta[3];
      resultado.fecha = `${d}/${m}/${y}`;
    } else {
      const diaMatch = t.match(/(?:del?|el)\s+(\d{1,2})/i);
      if (diaMatch) {
        const now = new Date();
        resultado.diaBusqueda = diaMatch[1].padStart(2,'0');
      }
    }

    // Extraer cliente/concepto (texto que no es número ni fecha)
    const palabras = t.split(/\s+/).filter(p => !/^\$?\d+/.test(p) && p.length > 2);
    const stopWords = ['de','del','la','el','los','las','una','un','que','por','para','con','sin','en','a','al','venta','gasto','ventas','gastos','agrega','registra','borra','quita','elimina','cambia','corrige'];
    const posibleNombre = palabras.filter(p => !stopWords.includes(n(p))).join(' ');
    if (posibleNombre) resultado.clienteRaw = posibleNombre;

    return resultado;
  }

  // ============================================================
  // BUSCAR REGISTROS EN SHEETS
  // ============================================================
  function buscarRegistros(text) {
    const t = n(text);
    const datos = extraerDatos(text);
    const encontrados = [];

    const buscarEn = (sheet, rows, getDesc) => {
      rows.slice(1).forEach((r, i) => {
        if (!r[0]) return;
        const fecha = n(r[0]);
        const campo2 = n(r[2] || ''); // cliente o concepto
        const campo1 = n(r[1] || ''); // folio o proveedor
        const total = n((r[3] || '').replace(/\$|,/g, ''));

        let score = 0;

        // Por día
        if (datos.diaBusqueda) {
          const partes = fecha.split('/');
          if (partes[0] === datos.diaBusqueda) score += 3;
        }

        // Por fecha completa
        if (datos.fecha && fecha === n(datos.fecha)) score += 5;

        // Por cliente/concepto
        if (campo2 && t.includes(campo2)) score += 4;
        if (campo1 && t.includes(campo1)) score += 2;

        // Por alias de nombre
        const nombreNorm = n(normalizarNombre(campo2));
        if (t.includes(nombreNorm) || nombreNorm.split(' ').some(p => p.length > 3 && t.includes(p))) score += 3;

        // Por monto
        if (datos.total && Math.abs(parseFloat(total.replace('$','')) - datos.total) < 0.01) score += 4;

        if (score > 0) encontrados.push({ sheet, fila: i+2, score, desc: getDesc(r) });
      });
    };

    if (sheetData?.['VENTAS']) buscarEn('VENTAS', sheetData['VENTAS'], r => `${r[0]} — ${r[2] || ''} — ${r[3] || ''}`);
    if (sheetData?.['GASTOS']) buscarEn('GASTOS', sheetData['GASTOS'], r => `${r[0]} — ${r[1] || ''} — ${r[3] || ''}`);

    return encontrados.sort((a,b) => b.score - a.score);
  }

  // ============================================================
  // MOSTRAR TABLAS DESDE SHEETS
  // ============================================================
  function mostrarVentas(filtroMes) {
    if (!sheetData?.['VENTAS']?.length > 1) return 'No hay ventas registradas.';
    let rows = sheetData['VENTAS'].slice(1).filter(r => r[0]);
    if (filtroMes) rows = rows.filter(r => n(r[0]).includes(filtroMes));
    if (!rows.length) return 'No hay ventas para ese periodo.';
    let total = 0;
    let tbody = rows.map(r => {
      const t = parseFloat((r[3] || '0').replace(/\$|,/g,'')) || 0;
      total += t;
      return `<tr><td>${r[0]||''}</td><td>${r[2]||''}</td><td>${r[3]||'$0'}</td></tr>`;
    }).join('');
    return `<table class="chat-table"><thead><tr><th>Fecha</th><th>Cliente</th><th>Total</th></tr></thead><tbody>${tbody}</tbody><tfoot><tr><td colspan="2">TOTAL</td><td>$${total.toFixed(2)}</td></tr></tfoot></table>`;
  }

  function mostrarGastos(filtroMes) {
    if (!sheetData?.['GASTOS']?.length > 1) return 'No hay gastos registrados.';
    let rows = sheetData['GASTOS'].slice(1).filter(r => r[0]);
    if (filtroMes) rows = rows.filter(r => n(r[0]).includes(filtroMes));
    if (!rows.length) return 'No hay gastos para ese periodo.';
    let total = 0;
    let tbody = rows.map(r => {
      const t = parseFloat((r[3] || '0').replace(/\$|,/g,'')) || 0;
      total += t;
      return `<tr><td>${r[0]||''}</td><td>${r[1]||''}</td><td>${r[2]||''}</td><td>${r[3]||'$0'}</td></tr>`;
    }).join('');
    return `<table class="chat-table"><thead><tr><th>Fecha</th><th>Concepto</th><th>Proveedor</th><th>Total</th></tr></thead><tbody>${tbody}</tbody><tfoot><tr><td colspan="3">TOTAL</td><td>$${total.toFixed(2)}</td></tr></tfoot></table>`;
  }

  function mostrarResumenSAT() {
    if (!sheetData?.['RESUMEN SAT']?.length > 1) return 'No hay datos del SAT.';
    const rows = sheetData['RESUMEN SAT'].slice(1).filter(r => r.slice(1).some(v => v && v !== '0' && v !== '$0.00'));
    if (!rows.length) return 'No hay datos del SAT aún.';
    let tbody = rows.map(r => `<tr><td>${r[0]||''}</td><td>${r[1]||'$0'}</td><td>${r[2]||'$0'}</td><td>${r[5]||'$0'}</td><td>${r[6]||'$0'}</td></tr>`).join('');
    return `<table class="chat-table"><thead><tr><th>Mes</th><th>Ingresos</th><th>Gastos</th><th>IVA a Pagar</th><th>ISR</th></tr></thead><tbody>${tbody}</tbody></table>`;
  }

  // ============================================================
  // MANEJAR CONSULTAS SIN EL BOT
  // ============================================================
  function manejarConsulta(text) {
    const t = n(text);

    // Detectar filtro de mes
    const meses = { 'enero':'01','febrero':'02','marzo':'03','abril':'04','mayo':'05',
      'junio':'06','julio':'07','agosto':'08','septiembre':'09','octubre':'10',
      'noviembre':'11','diciembre':'12','este mes': String(new Date().getMonth()+1).padStart(2,'0') };
    let filtroMes = null;
    for (const [nombre, num] of Object.entries(meses)) {
      if (t.includes(nombre)) { filtroMes = '/' + num + '/'; break; }
    }

    if (t.includes('sat') || t.includes('iva') || t.includes('isr') || t.includes('debo') || t.includes('impuesto')) {
      return 'Resumen SAT:\n' + mostrarResumenSAT();
    }
    if (t.includes('gasto')) {
      return 'Gastos registrados:\n' + mostrarGastos(filtroMes);
    }
    if (t.includes('venta') || t.includes('vendi') || t.includes('vendio')) {
      return 'Ventas registradas:\n' + mostrarVentas(filtroMes);
    }
    // Por defecto mostrar ambas
    return 'Ventas:\n' + mostrarVentas(filtroMes) + '\n\nGastos:\n' + mostrarGastos(filtroMes);
  }

  // ============================================================
  // EJECUTAR ELIMINACIÓN
  // ============================================================
  async function ejecutarEliminacion(registros) {
    const typingId = addTyping();
    try {
      const sheets = new Set(registros.map(r => r.sheet));
      for (const sheet of sheets) {
        const filas = registros.filter(r => r.sheet === sheet).sort((a,b) => b.fila - a.fila);
        for (const f of filas) await deleteFromSheet(f.sheet, f.fila);
        await reorganizeSheet(sheet);
      }
      sheetData = null;
      pendingDelete = null;
      removeTyping(typingId);
      const msg = `🗑️ ¡Listo! ${registros.length} registro${registros.length > 1 ? 's eliminados' : ' eliminado'} de Google Sheets.`;
      addMessage('bot', msg);
      history.push({ role: 'assistant', content: msg });
    } catch(e) {
      removeTyping(typingId);
      addMessage('bot', '❌ Error: ' + e.message);
    }
  }

  function getFechaHoy() {
    const now = new Date();
    return `${String(now.getDate()).padStart(2,'0')}/${String(now.getMonth()+1).padStart(2,'0')}/${now.getFullYear()}`;
  }

  function buildContext(data) {
    let ctx = '';
    if (data['VENTAS']?.length > 1) {
      ctx += '\nVENTAS (fila | fecha | folio | cliente | total):\n';
      data['VENTAS'].slice(1).forEach((r, i) => { if (r[0]) ctx += `- fila ${i+2}: ${r.join(' | ')}\n`; });
    }
    if (data['GASTOS']?.length > 1) {
      ctx += '\nGASTOS (fila | fecha | concepto | proveedor | total):\n';
      data['GASTOS'].slice(1).forEach((r, i) => { if (r[0]) ctx += `- fila ${i+2}: ${r.join(' | ')}\n`; });
    }
    return ctx || 'Sin datos aún.';
  }

  // ============================================================
  // SEND MESSAGE PRINCIPAL
  // ============================================================
  async function sendMessage() {
    const input = document.getElementById('input');
    const text = input.value.trim();
    if (!text) return;

    addMessage('user', text);
    input.value = '';
    input.style.height = 'auto';

    if (!sheetData) sheetData = await fetchSheets(document.getElementById('sheetId').value.trim());

    const intencion = detectarIntencion(text);

    // ---- CONFIRMAR eliminación pendiente ----
    if (pendingDelete && intencion === 'confirmar') {
      history.push({ role: 'user', content: text });
      await ejecutarEliminacion(pendingDelete);
      return;
    }
    if (pendingDelete && intencion !== 'confirmar') pendingDelete = null;

    // ---- CONSULTAR — responde el código directamente ----
    if (intencion === 'consultar') {
      const respuesta = manejarConsulta(text);
      history.push({ role: 'user', content: text });
      history.push({ role: 'assistant', content: respuesta });
      addMessage('bot', respuesta);
      return;
    }

    // ---- ELIMINAR — el código busca y confirma ----
    if (intencion === 'eliminar') {
      const t = n(text);
      const esMasiva = t.includes('todo') || t.includes('todos') || t.includes('todas') || t.includes('limpiar') || t.includes('vaciar');

      if (esMasiva) {
        const soloVentas = t.includes('venta') && !t.includes('gasto');
        const soloGastos = t.includes('gasto') && !t.includes('venta');
        const ambos = !soloVentas && !soloGastos;
        const registros = [];
        if (ambos || soloVentas) sheetData['VENTAS']?.slice(1).forEach((r, i) => { if (r[0]) registros.push({ sheet: 'VENTAS', fila: i+2, desc: `${r[0]} ${r[2]}` }); });
        if (ambos || soloGastos) sheetData['GASTOS']?.slice(1).forEach((r, i) => { if (r[0]) registros.push({ sheet: 'GASTOS', fila: i+2, desc: `${r[0]} ${r[1]}` }); });

        if (!registros.length) {
          const msg = 'No hay registros que eliminar.';
          history.push({ role: 'user', content: text });
          addMessage('bot', msg);
          history.push({ role: 'assistant', content: msg });
          return;
        }
        pendingDelete = registros;
        history.push({ role: 'user', content: text });
        const msg = `¿Confirmas? Se eliminarán ${registros.length} registros de Google Sheets.`;
        addMessage('bot', msg);
        history.push({ role: 'assistant', content: msg });
        return;
      }

      // Eliminación específica
      const encontrados = buscarRegistros(text);
      if (encontrados.length > 0) {
        pendingDelete = encontrados;
        history.push({ role: 'user', content: text });
        let msg;
        if (encontrados.length === 1) {
          msg = `¿Confirmas eliminar: ${encontrados[0].desc}?`;
        } else {
          const lista = encontrados.slice(0,5).map((r,i) => `${i+1}. ${r.desc}`).join('\n');
          msg = `Encontré ${encontrados.length} registros:\n${lista}\n\n¿Confirmas eliminar todos?`;
        }
        addMessage('bot', msg);
        history.push({ role: 'assistant', content: msg });
        return;
      }

      // No encontró — pedir más info
      history.push({ role: 'user', content: text });
      const msg = '¿De cuál registro? Dime el cliente, fecha o monto.';
      addMessage('bot', msg);
      history.push({ role: 'assistant', content: msg });
      return;
    }

    // ---- REGISTRAR / EDITAR — usar el bot ----
    history.push({ role: 'user', content: text });
    const typingId = addTyping();

    try {
      const ctx = buildContext(sheetData);
      const hoy = getFechaHoy();

      const systemPrompt = `Eres el asistente de Suheid Wong. Tu única función es REGISTRAR y EDITAR ventas y gastos en Google Sheets. NUNCA inventes datos ni respondas sobre consultas de ventas/gastos — eso lo maneja el sistema.

Fecha hoy: ${hoy}.
El monto dado es el TOTAL FINAL. NUNCA calcules IVA ni subtotal ni los menciones.
Si faltan datos (cliente o monto), pregunta qué falta.

NOMBRES FRECUENTES: "baner"→Grupo Baner, "jonhy/johny"→Grupo Jonhy, "aero"→Aeropuerto, "felipe"→Felipe
ERRORES DE TIPEO: "agegra"=agrega, "benta"=venta, "pague"=pagué

ACCIONES (al final, una por línea):
REGISTRAR_VENTA:{"fecha":"DD/MM/YYYY","folio":"","cliente":"nombre","total":0}
REGISTRAR_GASTO:{"fecha":"DD/MM/YYYY","concepto":"","proveedor":"","total":0}
EDITAR_VENTA:{"fila":0,"fecha":"DD/MM/YYYY","folio":"","cliente":"nombre","total":0}
EDITAR_GASTO:{"fila":0,"fecha":"DD/MM/YYYY","concepto":"","proveedor":"","total":0}

DATOS:
${ctx}`;

      const res = await fetch(`${WORKER_URL}/api/chat`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ model: 'claude-haiku-4-5-20251001', max_tokens: 800, system: systemPrompt, messages: history })
      });

      removeTyping(typingId);
      if (!res.ok) { const err = await res.json(); throw new Error(err.error?.message || 'Error API'); }

      const data = await res.json();
      let reply = data.content[0].text;
      let notifications = '';
      let needsReorgV = false, needsReorgG = false;

      const extractAll = (txt, cmd) => {
        const regex = new RegExp(cmd + ':(\\{[^{}]+\\})', 'g');
        const results = []; let m;
        while ((m = regex.exec(txt)) !== null) { try { results.push(JSON.parse(m[1])); } catch(e){} }
        return results;
      };

      for (const v of extractAll(reply, 'REGISTRAR_VENTA')) {
        await appendToSheet('VENTAS', [[v.fecha, v.folio, v.cliente, v.total]]);
        sheetData = null; needsReorgV = true;
        notifications += '\n\n✅ ¡Venta registrada!';
      }
      for (const g of extractAll(reply, 'REGISTRAR_GASTO')) {
        await appendToSheet('GASTOS', [[g.fecha, g.concepto, g.proveedor, g.total]]);
        sheetData = null; needsReorgG = true;
        notifications += '\n\n✅ ¡Gasto registrado!';
      }
      for (const v of extractAll(reply, 'EDITAR_VENTA')) {
        await editSheetRow('VENTAS', v.fila, [v.fecha, v.folio, v.cliente, v.total]);
        sheetData = null; needsReorgV = true;
        notifications += '\n\n✅ ¡Venta actualizada!';
      }
      for (const g of extractAll(reply, 'EDITAR_GASTO')) {
        await editSheetRow('GASTOS', g.fila, [g.fecha, g.concepto, g.proveedor, g.total]);
        sheetData = null; needsReorgG = true;
        notifications += '\n\n✅ ¡Gasto actualizado!';
      }

      if (needsReorgV) await reorganizeSheet('VENTAS');
      if (needsReorgG) await reorganizeSheet('GASTOS');

      reply = reply
        .replace(/REGISTRAR_VENTA:\{[^{}]+\}/g, '')
        .replace(/REGISTRAR_GASTO:\{[^{}]+\}/g, '')
        .replace(/EDITAR_VENTA:\{[^{}]+\}/g, '')
        .replace(/EDITAR_GASTO:\{[^{}]+\}/g, '')
        .trim() + notifications;

      history.push({ role: 'assistant', content: reply });
      addMessage('bot', reply);

    } catch(e) {
      removeTyping(typingId);
      history.pop();
      addMessage('bot', '❌ Error: ' + e.message);
    }
  }

  function addMessage(role, text) {
    const msgs = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'message ' + role;
    const av = document.createElement('div');
    av.className = 'avatar';
    av.textContent = role === 'bot' ? '🤖' : '👤';
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.innerHTML = (text.includes('<table') || text.includes('<div')) ? text : text.replace(/\n/g,'<br>').replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>');
    div.appendChild(av);
    div.appendChild(bubble);
    msgs.appendChild(div);
    msgs.scrollTop = msgs.scrollHeight;
  }

  function addTyping() {
    const msgs = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'message bot';
    const id = 'typing-' + Date.now();
    div.id = id;
    div.innerHTML = '<div class="avatar">🤖</div><div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>';
    msgs.appendChild(div);
    msgs.scrollTop = msgs.scrollHeight;
    return id;
  }

  function removeTyping(id) {
    const el = document.getElementById(id);
    if (el) el.remove();
  }
</script>
