<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bot Negocio Mamá</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap');
  :root {
    --bg: #0f0f0f; --surface: #1a1a1a; --surface2: #242424;
    --border: #2e2e2e; --accent: #00e5a0; --accent2: #00b37d;
    --text: #f0f0f0; --muted: #888; --user-bubble: #1e3a2f; --bot-bubble: #1a1a1a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
  header { padding: 16px 24px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; background: var(--surface); }
  .logo { width: 36px; height: 36px; background: var(--accent); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
  .header-info h1 { font-size: 15px; font-weight: 600; }
  .header-info p { font-size: 12px; color: var(--muted); }
  .status-dot { width: 8px; height: 8px; background: var(--accent); border-radius: 50%; margin-left: auto; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  .config-bar { background: var(--surface2); border-bottom: 1px solid var(--border); padding: 10px 24px; display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
  .config-bar label { font-size: 11px; color: var(--muted); font-family: 'DM Mono', monospace; text-transform: uppercase; }
  .config-bar input { background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 6px 10px; border-radius: 6px; font-size: 12px; font-family: 'DM Mono', monospace; width: 240px; outline: none; }
  .config-bar input:focus { border-color: var(--accent); }
  .config-bar button { background: var(--accent); color: #000; border: none; padding: 6px 14px; border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer; }
  .connected-badge { font-size: 11px; color: var(--accent); font-family: 'DM Mono', monospace; display: none; }
  .messages { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 16px; }
  .message { display: flex; gap: 10px; max-width: 80%; animation: fadeIn 0.3s ease; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
  .message.user { align-self: flex-end; flex-direction: row-reverse; }
  .avatar { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; }
  .message.bot .avatar { background: var(--accent); }
  .message.user .avatar { background: var(--surface2); border: 1px solid var(--border); }
  .bubble { padding: 12px 16px; border-radius: 12px; font-size: 14px; line-height: 1.6; }
  .message.bot .bubble { background: var(--bot-bubble); border: 1px solid var(--border); border-top-left-radius: 4px; }
  .message.user .bubble { background: var(--user-bubble); border: 1px solid #1e5c42; border-top-right-radius: 4px; color: #b8f0d8; }
  .bubble table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 13px; }
  .bubble th { background: var(--surface2); padding: 8px 12px; text-align: left; color: var(--accent); font-size: 11px; border-bottom: 1px solid var(--border); }
  .bubble td { padding: 8px 12px; border-bottom: 1px solid var(--border); }
  .quick-btns { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
  .quick-btn { background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 6px 12px; border-radius: 20px; font-size: 12px; cursor: pointer; }
  .quick-btn:hover { border-color: var(--accent); color: var(--accent); }
  .typing { display: flex; gap: 4px; align-items: center; padding: 14px 16px; }
  .typing span { width: 6px; height: 6px; background: var(--muted); border-radius: 50%; animation: bounce 1.2s infinite; }
  .typing span:nth-child(2){animation-delay:0.2s} .typing span:nth-child(3){animation-delay:0.4s}
  @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-4px)} }
  .input-area { padding: 16px 24px; border-top: 1px solid var(--border); background: var(--surface); display: flex; gap: 10px; align-items: flex-end; }
  textarea { flex: 1; background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 12px 16px; border-radius: 10px; font-size: 14px; font-family: 'DM Sans', sans-serif; resize: none; outline: none; line-height: 1.5; max-height: 120px; }
  textarea:focus { border-color: var(--accent); }
  textarea::placeholder { color: var(--muted); }
  .send-btn { background: var(--accent); border: none; color: #000; width: 42px; height: 42px; border-radius: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .send-btn svg { width: 18px; height: 18px; }
</style>
</head>
<body>
<header>
  <div class="logo">🧾</div>
  <div class="header-info">
    <h1>Bot Negocio Mamá</h1>
    <p>Asistente de ventas, gastos y SAT</p>
  </div>
  <div class="status-dot"></div>
</header>
<div class="config-bar">
  <label>Sheet ID:</label>
  <input type="text" id="sheetId" value="1Fb_WVSHJfwNihg1-ETL3HuVtOkbH1MD8sDxrD6LFZ30" />
  <button onclick="conectar()">Conectar</button>
  <span class="connected-badge" id="connectedBadge">✓ Conectado</span>
</div>
<div class="messages" id="messages">
  <div class="message bot">
    <div class="avatar">🤖</div>
    <div class="bubble">
      ¡Hola! Soy el asistente del negocio de tu mamá. 👋<br><br>
      Haz clic en <strong>Conectar</strong> para empezar.
      <div class="quick-btns">
        <span class="quick-btn" onclick="preguntar(this)">📊 Ver resumen del mes</span>
        <span class="quick-btn" onclick="preguntar(this)">💰 ¿Cuánto debo al SAT?</span>
        <span class="quick-btn" onclick="preguntar(this)">📈 Ventas por mes</span>
        <span class="quick-btn" onclick="preguntar(this)">📉 Gastos totales</span>
      </div>
    </div>
  </div>
</div>
<div class="input-area">
  <textarea id="input" placeholder="Pregúntame algo del negocio..." rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
  <button class="send-btn" onclick="sendMessage()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <line x1="22" y1="2" x2="11" y2="13"></line>
      <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
    </svg>
  </button>
</div>
<script>
  const WORKER_URL = 'https://bot-negocio-mama.fidelwong753.workers.dev';
  let sheetData = null;
  let history = [];

  window.addEventListener('load', () => {
    const s = localStorage.getItem('bot_sheet_id');
    if (s) document.getElementById('sheetId').value = s;
  });

  function preguntar(el) {
    document.getElementById('input').value = el.textContent.trim().replace(/^[^\w]+/, '');
    sendMessage();
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  }

  async function conectar() {
    const sheetId = document.getElementById('sheetId').value.trim();
    addMessage('bot', '🔄 Conectando con Google Sheets...');
    try {
      sheetData = await fetchSheets(sheetId);
      history = [];
      localStorage.setItem('bot_sheet_id', sheetId);
      document.getElementById('connectedBadge').style.display = 'inline';
      addMessage('bot', '✅ ¡Conectado! Puedo leer y escribir en tus hojas. ¿Qué necesitas?');
    } catch(e) {
      addMessage('bot', '❌ Error conectando: ' + e.message);
    }
  }

  async function fetchSheets(sheetId) {
    const names = ['VENTAS','GASTOS','RESUMEN SAT'];
    const data = {};
    for (const name of names) {
      const url = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(name)}`;
      const res = await fetch(url);
      if (!res.ok) throw new Error('No se pudo leer ' + name);
      data[name] = parseCSV(await res.text());
    }
    return data;
  }

  function parseCSV(text) {
    return text.trim().split('\n').map(line => {
      const cols = []; let cur = ''; let q = false;
      for (let c of line) {
        if (c === '"') q = !q;
        else if (c === ',' && !q) { cols.push(cur.trim()); cur = ''; }
        else cur += c;
      }
      cols.push(cur.trim());
      return cols;
    });
  }

  async function appendToSheet(sheet, values) {
    const sheetId = document.getElementById('sheetId').value.trim();
    const res = await fetch(`${WORKER_URL}/api/sheets`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ sheetId, range: sheet, values })
    });
    return await res.json();
  }

  async function editSheet(sheet, row, values) {
    const sheetId = document.getElementById('sheetId').value.trim();
    const res = await fetch(`${WORKER_URL}/api/sheets/edit`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ sheetId, range: sheet, row, values })
    });
    return await res.json();
  }

  async function deleteFromSheet(sheet, row) {
    const sheetId = document.getElementById('sheetId').value.trim();
    const res = await fetch(`${WORKER_URL}/api/sheets/delete`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ sheetId, range: sheet, row })
    });
    return await res.json();
  }

  function extractAll(reply, comando) {
    const regex = new RegExp(comando + ':(\\{[^{}]+\\})', 'g');
    const results = [];
    let match;
    while ((match = regex.exec(reply)) !== null) {
      try { results.push(JSON.parse(match[1])); } catch(e) {}
    }
    return results;
  }

  function buildContext(data) {
    let ctx = '';
    if (data['VENTAS']?.length > 1) {
      ctx += '\nVENTAS (fila | fecha | folio | cliente | total):\n';
      data['VENTAS'].slice(1).forEach((r, i) => {
        if (r[0]) ctx += `- fila ${i + 2}: ${r.join(' | ')}\n`;
      });
    }
    if (data['GASTOS']?.length > 1) {
      ctx += '\nGASTOS (fila | fecha | concepto | proveedor | total):\n';
      data['GASTOS'].slice(1).forEach((r, i) => {
        if (r[0]) ctx += `- fila ${i + 2}: ${r.join(' | ')}\n`;
      });
    }
    if (data['RESUMEN SAT']?.length > 1) {
      ctx += '\nRESUMEN SAT:\n';
      data['RESUMEN SAT'].slice(1).filter(r => r.slice(1).some(v => v && v !== '0')).forEach(r => {
        ctx += `${r[0]}: Ingresos=${r[1]} Gastos=${r[2]} IVA Cobrado=${r[3]} IVA Pagado=${r[4]} IVA a Pagar=${r[5]} ISR=${r[6]}\n`;
      });
    }
    return ctx || 'Sin datos aún.';
  }

  async function sendMessage() {
    const input = document.getElementById('input');
    const text = input.value.trim();
    if (!text) return;

    addMessage('user', text);
    input.value = '';
    input.style.height = 'auto';
    history.push({ role: 'user', content: text });

    const typingId = addTyping();

    try {
      if (!sheetData) sheetData = await fetchSheets(document.getElementById('sheetId').value.trim());
      const ctx = buildContext(sheetData);

      const systemPrompt = `Eres un asistente contable inteligente para un negocio en México que vende toners, cartuchos e insumos de impresión. La dueña es persona física con actividad empresarial. Habla en español casual y entiende lenguaje informal.

REGLAS ESTRICTAS:
- El monto que da el usuario es el TOTAL FINAL. Regístralo exactamente como lo dio.
- PROHIBIDO calcular, mostrar o mencionar subtotal ni IVA en el chat.
- Solo confirma: cliente, total exacto y fecha. Nada más.
- NUNCA pierdas el contexto de la conversación.
- Siempre tienes acceso a TODOS los datos aunque sean de hace mucho tiempo.
- Cada acción debe ir en su propio JSON separado, uno por línea. NUNCA uses listas o arreglos.
- Cuando elimines múltiples registros, ponlos de mayor a menor número de fila.

INTERPRETA EL LENGUAJE NATURAL — estos son ejemplos de lo que el usuario puede decir y cómo debes interpretarlo:

REGISTRAR:
- "agrega", "anota", "registra", "mete", "pon", "añade" → registrar
- "vendí", "le vendí", "venta de" → REGISTRAR_VENTA
- "compré", "gasté", "pagué", "gasto de" → REGISTRAR_GASTO

ELIMINAR:
- "borra", "quita", "elimina", "bórra", "quítame", "táchala", "ya no va" → eliminar
- "borra todo", "elimina todo", "quita todo", "bórralas todas" → eliminar TODOS los registros que existan
- "borra la de Felipe", "quita la venta de Grupo Baner" → eliminar ese registro específico

EDITAR:
- "cambia", "modifica", "corrige", "actualiza", "era", "el precio estaba mal" → editar
- "cámbialo a", "en realidad era", "corrígelo" → editar ese registro

CONSULTAR:
- "cuánto", "qué vendí", "mis ventas", "resumen", "cuánto debo" → solo responder sin JSON

ACCIONES — pon cada JSON en su propia línea al final de tu respuesta:

Registrar venta:
REGISTRAR_VENTA:{"fecha":"DD/MM/YYYY","folio":"","cliente":"nombre","total":0}

Registrar gasto:
REGISTRAR_GASTO:{"fecha":"DD/MM/YYYY","concepto":"","proveedor":"","total":0}

Editar venta:
EDITAR_VENTA:{"fila":0,"fecha":"DD/MM/YYYY","folio":"","cliente":"nombre","total":0}

Editar gasto:
EDITAR_GASTO:{"fila":0,"fecha":"DD/MM/YYYY","concepto":"","proveedor":"","total":0}

Eliminar venta:
ELIMINAR_VENTA:{"fila":0}

Eliminar gasto:
ELIMINAR_GASTO:{"fila":0}

DATOS DEL NEGOCIO:
${ctx}

Usa $ y formato mexicano para dinero.`;

      const res = await fetch(`${WORKER_URL}/api/chat`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-haiku-4-5-20251001',
          max_tokens: 1000,
          system: systemPrompt,
          messages: history
        })
      });

      removeTyping(typingId);

      if (!res.ok) {
        const err = await res.json();
        throw new Error(err.error?.message || 'Error API');
      }

      const data = await res.json();
      let reply = data.content[0].text;
      let notifications = '';

      for (const v of extractAll(reply, 'REGISTRAR_VENTA')) {
        await appendToSheet('VENTAS', [[v.fecha, v.folio, v.cliente, v.total]]);
        sheetData = null;
        notifications += '\n\n✅ ¡Venta registrada en Google Sheets!';
      }

      for (const g of extractAll(reply, 'REGISTRAR_GASTO')) {
        await appendToSheet('GASTOS', [[g.fecha, g.concepto, g.proveedor, g.total]]);
        sheetData = null;
        notifications += '\n\n✅ ¡Gasto registrado en Google Sheets!';
      }

      for (const v of extractAll(reply, 'EDITAR_VENTA')) {
        await editSheet('VENTAS', v.fila, [v.fecha, v.folio, v.cliente, v.total]);
        sheetData = null;
        notifications += '\n\n✅ ¡Venta actualizada en Google Sheets!';
      }

      for (const g of extractAll(reply, 'EDITAR_GASTO')) {
        await editSheet('GASTOS', g.fila, [g.fecha, g.concepto, g.proveedor, g.total]);
        sheetData = null;
        notifications += '\n\n✅ ¡Gasto actualizado en Google Sheets!';
      }

      const ventasEliminar = extractAll(reply, 'ELIMINAR_VENTA').sort((a, b) => b.fila - a.fila);
      for (const v of ventasEliminar) {
        await deleteFromSheet('VENTAS', v.fila);
        sheetData = null;
        notifications += '\n\n🗑️ ¡Venta eliminada de Google Sheets!';
      }

      const gastosEliminar = extractAll(reply, 'ELIMINAR_GASTO').sort((a, b) => b.fila - a.fila);
      for (const g of gastosEliminar) {
        await deleteFromSheet('GASTOS', g.fila);
        sheetData = null;
        notifications += '\n\n🗑️ ¡Gasto eliminado de Google Sheets!';
      }

      reply = reply
        .replace(/REGISTRAR_VENTA:\{[^{}]+\}/g, '')
        .replace(/REGISTRAR_GASTO:\{[^{}]+\}/g, '')
        .replace(/EDITAR_VENTA:\{[^{}]+\}/g, '')
        .replace(/EDITAR_GASTO:\{[^{}]+\}/g, '')
        .replace(/ELIMINAR_VENTA:\{[^{}]+\}/g, '')
        .replace(/ELIMINAR_GASTO:\{[^{}]+\}/g, '')
        .trim() + notifications;

      history.push({ role: 'assistant', content: reply });
      addMessage('bot', reply);

    } catch(e) {
      removeTyping(typingId);
      history.pop();
      addMessage('bot', '❌ Error: ' + e.message);
    }
  }

  function addMessage(role, text) {
    const msgs = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'message ' + role;
    const av = document.createElement('div');
    av.className = 'avatar';
    av.textContent = role === 'bot' ? '🤖' : '👤';
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.innerHTML = text.includes('<table') ? text : text.replace(/\n/g,'<br>').replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>');
    div.appendChild(av);
    div.appendChild(bubble);
    msgs.appendChild(div);
    msgs.scrollTop = msgs.scrollHeight;
  }

  function addTyping() {
    const msgs = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'message bot';
    const id = 'typing-' + Date.now();
    div.id = id;
    div.innerHTML = '<div class="avatar">🤖</div><div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>';
    msgs.appendChild(div);
    msgs.scrollTop = msgs.scrollHeight;
    return id;
  }

  function removeTyping(id) {
    const el = document.getElementById(id);
    if (el) el.remove();
  }
</script>
</body>
</html>
