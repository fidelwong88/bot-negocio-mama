<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#5BB8F5">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Consumibles Wong">
<link rel="manifest" href="/manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<title>Suheid Wong</title>
<style>
  :root {
    --bg: #EAF5FF;
    --surface: #ffffff;
    --surface2: #D6EEFA;
    --border: #B8DDF5;
    --accent: #5BB8F5;
    --accent2: #2A9AD6;
    --text: #1A3A52;
    --muted: #6B9AB8;
    --user-bubble: #5BB8F5;
    --bot-bubble: #ffffff;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
  }

  body::before {
    content: '';
    position: fixed;
    top: -200px;
    right: -200px;
    width: 600px;
    height: 600px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(91,184,245,0.15) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }
  body::after {
    content: '';
    position: fixed;
    bottom: -150px;
    left: -150px;
    width: 500px;
    height: 500px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(91,184,245,0.12) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .deco {
    position: fixed;
    pointer-events: none;
    z-index: 0;
    border-radius: 50%;
    border: 1px solid rgba(91,184,245,0.2);
  }
  .deco-1 { width: 300px; height: 300px; top: 10%; right: 5%; }
  .deco-2 { width: 200px; height: 200px; top: 15%; right: 10%; }
  .deco-3 { width: 150px; height: 150px; bottom: 20%; left: 3%; }

  header {
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
    background: rgba(255,255,255,0.85);
    backdrop-filter: blur(12px);
    position: relative;
    z-index: 10;
    box-shadow: 0 2px 20px rgba(91,184,245,0.1);
  }

  .logo {
    width: 40px;
    height: 40px;
    background: linear-gradient(135deg, #5BB8F5, #2A9AD6);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    box-shadow: 0 4px 12px rgba(91,184,245,0.3);
  }

  .header-info h1 {
    font-family: 'Playfair Display', serif;
    font-size: 18px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: 0.02em;
  }

  .header-info p {
    font-size: 11px;
    color: var(--muted);
    font-weight: 300;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  .status-dot {
    width: 8px;
    height: 8px;
    background: #5BB8F5;
    border-radius: 50%;
    margin-left: auto;
    animation: pulse 2s infinite;
    box-shadow: 0 0 8px rgba(91,184,245,0.5);
  }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.6;transform:scale(1.2)} }

  .config-bar {
    background: rgba(255,255,255,0.7);
    backdrop-filter: blur(8px);
    border-bottom: 1px solid var(--border);
    padding: 8px 24px;
    display: flex;
    gap: 12px;
    align-items: center;
    flex-wrap: wrap;
    position: relative;
    z-index: 10;
  }

  .config-bar label {
    font-size: 10px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .config-bar input {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 6px 10px;
    border-radius: 8px;
    font-size: 12px;
    font-family: 'DM Mono', monospace;
    width: 240px;
    outline: none;
    transition: border-color 0.2s;
  }
  .config-bar input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(91,184,245,0.15); }

  .config-bar button {
    background: linear-gradient(135deg, #5BB8F5, #2A9AD6);
    color: white;
    border: none;
    padding: 6px 16px;
    border-radius: 8px;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    box-shadow: 0 2px 8px rgba(91,184,245,0.3);
    transition: transform 0.1s, box-shadow 0.2s;
  }
  .config-bar button:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(91,184,245,0.4); }

  .connected-badge {
    font-size: 11px;
    color: var(--accent2);
    font-family: 'DM Mono', monospace;
    display: none;
    font-weight: 500;
  }

  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    position: relative;
    z-index: 1;
  }

  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-track { background: transparent; }
  .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .message {
    display: flex;
    gap: 10px;
    max-width: 82%;
    animation: fadeIn 0.3s ease;
  }
  @keyframes fadeIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }

  .message.user { align-self: flex-end; flex-direction: row-reverse; }

  .avatar {
    width: 34px;
    height: 34px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 15px;
    flex-shrink: 0;
  }
  .message.bot .avatar {
    background: linear-gradient(135deg, #5BB8F5, #2A9AD6);
    box-shadow: 0 2px 8px rgba(91,184,245,0.3);
  }
  .message.user .avatar {
    background: var(--surface);
    border: 1px solid var(--border);
  }

  .bubble {
    padding: 12px 16px;
    border-radius: 16px;
    font-size: 14px;
    line-height: 1.6;
  }

  .message.bot .bubble {
    background: rgba(255,255,255,0.9);
    backdrop-filter: blur(8px);
    border: 1px solid var(--border);
    border-top-left-radius: 4px;
    color: var(--text);
    box-shadow: 0 2px 12px rgba(91,184,245,0.08);
  }

  .message.user .bubble {
    background: linear-gradient(135deg, #5BB8F5, #2A9AD6);
    border-top-right-radius: 4px;
    color: white;
    box-shadow: 0 4px 16px rgba(91,184,245,0.35);
  }

  .bubble table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 13px; }
  .bubble th { background: var(--surface2); padding: 8px 12px; text-align: left; color: var(--accent2); font-size: 11px; border-bottom: 1px solid var(--border); }
  .bubble td { padding: 8px 12px; border-bottom: 1px solid var(--border); }

  .quick-btns { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
  .quick-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--accent2);
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 12px;
    cursor: pointer;
    font-weight: 500;
    transition: all 0.2s;
  }
  .quick-btn:hover { background: var(--accent); color: white; border-color: var(--accent); }

  .typing { display: flex; gap: 4px; align-items: center; padding: 14px 16px; }
  .typing span {
    width: 6px; height: 6px;
    background: var(--accent);
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }
  .typing span:nth-child(2){animation-delay:0.2s}
  .typing span:nth-child(3){animation-delay:0.4s}
  @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-5px)} }

  .input-area {
    padding: 16px 24px;
    border-top: 1px solid var(--border);
    background: rgba(255,255,255,0.85);
    backdrop-filter: blur(12px);
    display: flex;
    gap: 10px;
    align-items: flex-end;
    position: relative;
    z-index: 10;
    box-shadow: 0 -2px 20px rgba(91,184,245,0.08);
  }

  textarea {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 12px 16px;
    border-radius: 12px;
    font-size: 14px;
    font-family: 'DM Sans', sans-serif;
    resize: none;
    outline: none;
    line-height: 1.5;
    max-height: 120px;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(91,184,245,0.15); }
  textarea::placeholder { color: var(--muted); }

  .send-btn {
    background: linear-gradient(135deg, #5BB8F5, #2A9AD6);
    border: none;
    color: white;
    width: 44px;
    height: 44px;
    border-radius: 12px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    box-shadow: 0 4px 12px rgba(91,184,245,0.4);
    transition: transform 0.1s, box-shadow 0.2s;
  }
  .send-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 16px rgba(91,184,245,0.5); }
  .send-btn svg { width: 18px; height: 18px; }
</style>
</head>
<body>

<div class="deco deco-1"></div>
<div class="deco deco-2"></div>
<div class="deco deco-3"></div>

<header>
  <div class="logo">🧾</div>
  <div class="header-info">
    <h1>Suheid Wong</h1>
    <p>Ventas · Gastos · SAT</p>
  </div>
  <div class="status-dot"></div>
</header>

<div class="config-bar">
  <label>Sheet ID:</label>
  <input type="text" id="sheetId" value="1Fb_WVSHJfwNihg1-ETL3HuVtOkbH1MD8sDxrD6LFZ30" />
  <button onclick="conectar()">Conectar</button>
  <span class="connected-badge" id="connectedBadge">✓ Conectado</span>
</div>

<div class="messages" id="messages">
  <div class="message bot">
    <div class="avatar">🤖</div>
    <div class="bubble">
      ¡Hola! Conectando con Google Sheets...
    </div>
  </div>
</div>

<div class="input-area">
  <textarea id="input" placeholder="Pregúntame algo del negocio..." rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
  <button class="send-btn" onclick="sendMessage()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <line x1="22" y1="2" x2="11" y2="13"></line>
      <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
    </svg>
  </button>
</div>

<script>
  const WORKER_URL = 'https://bot-negocio-mama.fidelwong753.workers.dev';
  let sheetData = null;
  let history = [];

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js').catch(() => {});
  }

  window.addEventListener('load', () => {
    const s = localStorage.getItem('bot_sheet_id');
    if (s) document.getElementById('sheetId').value = s;
    conectar();
  });

  function preguntar(el) {
    document.getElementById('input').value = el.textContent.trim().replace(/^[^\w]+/, '');
    sendMessage();
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  }

  async function conectar() {
    const sheetId = document.getElementById('sheetId').value.trim();
    try {
      sheetData = await fetchSheets(sheetId);
      history = [];
      localStorage.setItem('bot_sheet_id', sheetId);
      document.getElementById('connectedBadge').style.display = 'inline';
      addMessage('bot', '✅ ¡Conectado! ¿Qué necesitas?\n<div class="quick-btns"><span class="quick-btn" onclick="preguntar(this)">📊 Ver resumen del mes</span><span class="quick-btn" onclick="preguntar(this)">💰 ¿Cuánto debo al SAT?</span><span class="quick-btn" onclick="preguntar(this)">📈 Ventas por mes</span><span class="quick-btn" onclick="preguntar(this)">📉 Gastos totales</span></div>');
    } catch(e) {
      addMessage('bot', '❌ Error conectando. Verifica tu conexión e intenta de nuevo.');
    }
  }

  async function fetchSheets(sheetId) {
    const names = ['VENTAS','GASTOS','RESUMEN SAT'];
    const data = {};
    for (const name of names) {
      const url = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(name)}`;
      const res = await fetch(url);
      if (!res.ok) throw new Error('No se pudo leer ' + name);
      data[name] = parseCSV(await res.text());
    }
    return data;
  }

  function parseCSV(text) {
    return text.trim().split('\n').map(line => {
      const cols = []; let cur = ''; let q = false;
      for (let c of line) {
        if (c === '"') q = !q;
        else if (c === ',' && !q) { cols.push(cur.trim()); cur = ''; }
        else cur += c;
      }
      cols.push(cur.trim());
      return cols;
    });
  }

  async function appendToSheet(sheet, values) {
    const sheetId = document.getElementById('sheetId').value.trim();
    const res = await fetch(`${WORKER_URL}/api/sheets`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ sheetId, range: sheet, values })
    });
    return await res.json();
  }

  async function editSheet(sheet, row, values) {
    const sheetId = document.getElementById('sheetId').value.trim();
    const res = await fetch(`${WORKER_URL}/api/sheets/edit`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ sheetId, range: sheet, row, values })
    });
    return await res.json();
  }

  async function deleteFromSheet(sheet, row) {
    const sheetId = document.getElementById('sheetId').value.trim();
    const res = await fetch(`${WORKER_URL}/api/sheets/delete`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ sheetId, range: sheet, row })
    });
    return await res.json();
  }

  async function reorganizeSheet(sheet) {
    const sheetId = document.getElementById('sheetId').value.trim();
    const res = await fetch(`${WORKER_URL}/api/sheets/reorganize`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ sheetId, range: sheet })
    });
    return await res.json();
  }

  function extractAll(reply, comando) {
    const regex = new RegExp(comando + ':(\\{[^{}]+\\})', 'g');
    const results = [];
    let match;
    while ((match = regex.exec(reply)) !== null) {
      try { results.push(JSON.parse(match[1])); } catch(e) {}
    }
    return results;
  }

  function getFechaHoy() {
    const now = new Date();
    const dia = String(now.getDate()).padStart(2, '0');
    const mes = String(now.getMonth() + 1).padStart(2, '0');
    const anio = now.getFullYear();
    return `${dia}/${mes}/${anio}`;
  }

  function buildContext(data) {
    let ctx = '';
    if (data['VENTAS']?.length > 1) {
      ctx += '\nVENTAS (fila | fecha | folio | cliente | total):\n';
      data['VENTAS'].slice(1).forEach((r, i) => {
        if (r[0]) ctx += `- fila ${i + 2}: ${r.join(' | ')}\n`;
      });
    }
    if (data['GASTOS']?.length > 1) {
      ctx += '\nGASTOS (fila | fecha | concepto | proveedor | total):\n';
      data['GASTOS'].slice(1).forEach((r, i) => {
        if (r[0]) ctx += `- fila ${i + 2}: ${r.join(' | ')}\n`;
      });
    }
    if (data['RESUMEN SAT']?.length > 1) {
      ctx += '\nRESUMEN SAT:\n';
      data['RESUMEN SAT'].slice(1).filter(r => r.slice(1).some(v => v && v !== '0')).forEach(r => {
        ctx += `${r[0]}: Ingresos=${r[1]} Gastos=${r[2]} IVA Cobrado=${r[3]} IVA Pagado=${r[4]} IVA a Pagar=${r[5]} ISR=${r[6]}\n`;
      });
    }
    return ctx || 'Sin datos aún.';
  }

  async function sendMessage() {
    const input = document.getElementById('input');
    const text = input.value.trim();
    if (!text) return;

    addMessage('user', text);
    input.value = '';
    input.style.height = 'auto';
    history.push({ role: 'user', content: text });

    const typingId = addTyping();

    try {
      if (!sheetData) sheetData = await fetchSheets(document.getElementById('sheetId').value.trim());
      const ctx = buildContext(sheetData);
      const hoy = getFechaHoy();

      const systemPrompt = `Eres un asistente contable inteligente para un negocio en México que vende toners, cartuchos e insumos de impresión. La dueña se llama Suheid Wong y es persona física con actividad empresarial. Habla en español casual y entiende lenguaje informal.

REGLAS ESTRICTAS:
- La fecha de hoy es ${hoy}. Úsala automáticamente en todos los registros a menos que el usuario indique otra fecha específica.
- El monto que da el usuario es el TOTAL FINAL. Regístralo exactamente como lo dio.
- PROHIBIDO calcular, mostrar o mencionar subtotal ni IVA en el chat.
- Solo confirma: cliente, total exacto y fecha. Nada más.
- NUNCA pierdas el contexto de la conversación.
- Siempre tienes acceso a TODOS los datos aunque sean de hace mucho tiempo.
- Cada acción debe ir en su propio JSON separado, uno por línea. NUNCA uses listas o arreglos.
- Cuando elimines múltiples registros, ponlos de mayor a menor número de fila.

MANEJO DE ERRORES Y AMBIGÜEDAD — MUY IMPORTANTE:
- El usuario puede escribir con faltas de ortografía, errores de tipeo o palabras incompletas. Intenta entender el significado real aunque esté mal escrito. Ejemplos: "agegra" = "agrega", "venta" = "venta", "borrar" = "eliminar", "jonhy" = "Jonhy", "baner" = "Baner".
- Si el mensaje es ambiguo o te faltan datos para completar la acción (cliente, monto, fecha diferente, concepto), pregunta específicamente lo que necesitas antes de registrar. Ejemplo: si dice "agrega una venta" sin monto ni cliente, pregunta "¿A qué cliente y por cuánto?".
- Si no entiendes el mensaje, di exactamente qué no entendiste y pide que lo repita de otra forma.
- NUNCA asumas datos que no te dieron. Si falta información importante, pregunta.
- Si el usuario confirma algo que ya hiciste, no lo repitas. Si dice "sí" o "correcto", solo confirma que quedó bien.
- Si el usuario corrige algo, actualiza sin problema y confirma el cambio.

INTERPRETA EL LENGUAJE NATURAL Y ERRORES COMUNES:

REGISTRAR:
- "agrega", "anota", "registra", "mete", "pon", "añade", "agegra", "registar", "anega" → registrar
- "vendí", "le vendí", "venta de", "vendi", "benta" → REGISTRAR_VENTA
- "compré", "gasté", "pagué", "gasto de", "gaste", "pague", "compre" → REGISTRAR_GASTO

ELIMINAR:
- "borra", "quita", "elimina", "bórra", "quítame", "táchala", "ya no va", "bora", "eliminar", "quitar" → eliminar
- "borra todo", "elimina todo", "quita todo", "bórralas todas", "borra todas" → eliminar TODOS
- "borra la de Felipe", "quita la de Baner" → eliminar ese registro específico

EDITAR:
- "cambia", "modifica", "corrige", "actualiza", "cámbialo", "en realidad era", "estaba mal", "cambia" → editar

CONSULTAR:
- "cuánto", "qué vendí", "mis ventas", "resumen", "cuánto debo", "cuanto", "que vendi" → solo responder sin JSON

NOMBRES DE CLIENTES FRECUENTES (interpreta variaciones):
- "baner", "baaner", "bander" → Grupo Baner
- "jonhy", "johny", "jonny", "johnny" → Grupo Jonhy
- "aero", "aeropuerto", "aerp" → Aeropuerto
- "felipe", "felip", "feliipe" → Felipe

ACCIONES — pon cada JSON en su propia línea al final de tu respuesta:
REGISTRAR_VENTA:{"fecha":"DD/MM/YYYY","folio":"","cliente":"nombre","total":0}
REGISTRAR_GASTO:{"fecha":"DD/MM/YYYY","concepto":"","proveedor":"","total":0}
EDITAR_VENTA:{"fila":0,"fecha":"DD/MM/YYYY","folio":"","cliente":"nombre","total":0}
EDITAR_GASTO:{"fila":0,"fecha":"DD/MM/YYYY","concepto":"","proveedor":"","total":0}
ELIMINAR_VENTA:{"fila":0}
ELIMINAR_GASTO:{"fila":0}

DATOS DEL NEGOCIO:
${ctx}

Usa $ y formato mexicano para dinero.`;

      const res = await fetch(`${WORKER_URL}/api/chat`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-haiku-4-5-20251001',
          max_tokens: 1000,
          system: systemPrompt,
          messages: history
        })
      });

      removeTyping(typingId);

      if (!res.ok) {
        const err = await res.json();
        throw new Error(err.error?.message || 'Error API');
      }

      const data = await res.json();
      let reply = data.content[0].text;
      let notifications = '';
      let needsReorganizeVentas = false;
      let needsReorganizeGastos = false;

      for (const v of extractAll(reply, 'REGISTRAR_VENTA')) {
        await appendToSheet('VENTAS', [[v.fecha, v.folio, v.cliente, v.total]]);
        sheetData = null; needsReorganizeVentas = true;
        notifications += '\n\n✅ ¡Venta registrada!';
      }
      for (const g of extractAll(reply, 'REGISTRAR_GASTO')) {
        await appendToSheet('GASTOS', [[g.fecha, g.concepto, g.proveedor, g.total]]);
        sheetData = null; needsReorganizeGastos = true;
        notifications += '\n\n✅ ¡Gasto registrado!';
      }
      for (const v of extractAll(reply, 'EDITAR_VENTA')) {
        await editSheet('VENTAS', v.fila, [v.fecha, v.folio, v.cliente, v.total]);
        sheetData = null; needsReorganizeVentas = true;
        notifications += '\n\n✅ ¡Venta actualizada!';
      }
      for (const g of extractAll(reply, 'EDITAR_GASTO')) {
        await editSheet('GASTOS', g.fila, [g.fecha, g.concepto, g.proveedor, g.total]);
        sheetData = null; needsReorganizeGastos = true;
        notifications += '\n\n✅ ¡Gasto actualizado!';
      }

      const ventasEliminar = extractAll(reply, 'ELIMINAR_VENTA').sort((a, b) => b.fila - a.fila);
      for (const v of ventasEliminar) {
        await deleteFromSheet('VENTAS', v.fila);
        sheetData = null; needsReorganizeVentas = true;
        notifications += '\n\n🗑️ ¡Venta eliminada!';
      }

      const gastosEliminar = extractAll(reply, 'ELIMINAR_GASTO').sort((a, b) => b.fila - a.fila);
      for (const g of gastosEliminar) {
        await deleteFromSheet('GASTOS', g.fila);
        sheetData = null; needsReorganizeGastos = true;
        notifications += '\n\n🗑️ ¡Gasto eliminado!';
      }

      if (needsReorganizeVentas) await reorganizeSheet('VENTAS');
      if (needsReorganizeGastos) await reorganizeSheet('GASTOS');

      reply = reply
        .replace(/REGISTRAR_VENTA:\{[^{}]+\}/g, '')
        .replace(/REGISTRAR_GASTO:\{[^{}]+\}/g, '')
        .replace(/EDITAR_VENTA:\{[^{}]+\}/g, '')
        .replace(/EDITAR_GASTO:\{[^{}]+\}/g, '')
        .replace(/ELIMINAR_VENTA:\{[^{}]+\}/g, '')
        .replace(/ELIMINAR_GASTO:\{[^{}]+\}/g, '')
        .trim() + notifications;

      history.push({ role: 'assistant', content: reply });
      addMessage('bot', reply);

    } catch(e) {
      removeTyping(typingId);
      history.pop();
      addMessage('bot', '❌ Error: ' + e.message);
    }
  }

  function addMessage(role, text) {
    const msgs = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'message ' + role;
    const av = document.createElement('div');
    av.className = 'avatar';
    av.textContent = role === 'bot' ? '🤖' : '👤';
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.innerHTML = text.includes('<table') || text.includes('<div') ? text : text.replace(/\n/g,'<br>').replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>');
    div.appendChild(av);
    div.appendChild(bubble);
    msgs.appendChild(div);
    msgs.scrollTop = msgs.scrollHeight;
  }

  function addTyping() {
    const msgs = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'message bot';
    const id = 'typing-' + Date.now();
    div.id = id;
    div.innerHTML = '<div class="avatar">🤖</div><div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>';
    msgs.appendChild(div);
    msgs.scrollTop = msgs.scrollHeight;
    return id;
  }

  function removeTyping(id) {
    const el = document.getElementById(id);
    if (el) el.remove();
  }
</script>
</body>
</html>
